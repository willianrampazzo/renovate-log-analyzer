name: Validate

on:
  push:
    branches: [main]
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check go mod tidy
        run: |
          go mod tidy -diff

      - name: Check format
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "Go sources are not gofmt-clean. Run 'go fmt ./...' and commit."
            gofmt -d $files
            exit 1
          fi

      - name: Run unit tests
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Set up Node for markdownlint
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: markdownlint
        run: npx --yes markdownlint-cli@0.48.0 "**/*.md"

  agent:
    name: Agent
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Check length of AGENTS.md (max 300 lines)
        run: |
          set -euo pipefail
          lines=$(wc -l < AGENTS.md)
          echo "AGENTS.md line count: ${lines}"
          if [ "${lines}" -gt 300 ]; then
            echo "::warning file=AGENTS.md::AGENTS.md has ${lines} lines (max 300)."
            exit 1
          fi
