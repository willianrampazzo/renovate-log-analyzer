repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Block commits on default branches (use a PR instead of committing straight to main).
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]
        files: \.(md|markdown)$

  - repo: local
    hooks:
      - id: agents-md-max-lines
        name: AGENTS.md at most 300 lines
        entry: bash -c 'lines=$(wc -l < AGENTS.md); if [ "$lines" -gt 300 ]; then echo "AGENTS.md has $lines lines (max 300)"; exit 1; fi'
        language: system
        files: ^AGENTS\.md$
        pass_filenames: false
